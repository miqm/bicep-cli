---
# See ../DEPENDENCIES.md#workaround-for-other-dependencies
name: Dependabot hack
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - never-trigger-this-dependabot-hack-workflow

jobs:

  dependabot_hack:
    name: Ensure dependabot version checks
    runs-on: ubuntu-20.04
    steps:    
      # Dockerfile:
      - uses: azure/bicep@v0.44.1

      - uses: azure/azure-cli@azure-cli-2.88.0

      - uses: mikefarah/yq@v4.53.3

      - uses: geofffranks/spruce@v1.35.13

      - uses: Azure/azure-storage-azcopy@v10.32.6

      - uses: tfutils/tfenv@v3.2.2
      
      - uses: kubernetes/kubernetes@v1.28.3
      
      - uses: helm/helm@v4.2.3

      - uses: Azure/kubelogin@v0.2.19

      - uses: pulumi/pulumi@v3.253.0

      # ci/bicep-cli.yml:
      - uses: docker/cli@v24.0.6
